<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Print</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1.5px solid #dde1e7;
      border-radius: 14px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .link-item:hover {
      background: #eef2ff;
      border-color: #6c63ff;
    }

    .link-item:active {
      transform: scale(0.98);
    }

    .link-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔗 Shop Print</h2>
    <div class="link-list">
      <a class="link-item" href="https://file.dgkim.net/shop-print/shopprint-linux-v1.0.5-rc2.tar.gz">
        <span class="link-icon">🐧</span>
        <span class="link-label">For Linux</span>
        <span class="link-arrow">›</span>
      </a>
      <a class="link-item" href="https://file.dgkim.net/shop-print/ShopPrint-v1.0.5-rc2.dmg">
        <span class="link-icon">🍎</span>
        <span class="link-label">For Mac</span>
        <span class="link-arrow">›</span>
      </a>
      <!--a class="link-item" href="https://file.dgkim.net/shop-print/shopprint-macos-v1.0.5-rc2.tar.gz">
        <span class="link-icon">🍎</span>
        <span class="link-label">For Mac</span>
        <span class="link-arrow">›</span>
      </a-->
      <a class="link-item" href="https://file.dgkim.net/shop-print/shopprint-windows-v1.0.5-rc2.zip">
        <span class="link-icon">🪟</span>
        <span class="link-label">For Windows</span>
        <span class="link-arrow">›</span>
      </a>
    </div>
  </div>
</body>
</html>
