<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCM Token Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[name=username] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #dde1e7;
      border-radius: 12px;
      font-size: 1rem;
      color: #1a1a2e;
      outline: none;
      background: #f8fafc;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[name=username]:focus {
      border-color: #ff6b35;
      background: #fff;
    }

    #registerBtn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b35, #f7c59f);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.1s;
    }

    #registerBtn:hover  { opacity: 0.92; }
    #registerBtn:active { transform: scale(0.98); }

    .status-box {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      display: none;
      word-break: break-all;
    }

    .status-box.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1.5px solid #a5d6a7;
    }

    .status-box.error {
      display: block;
      background: #fce4ec;
      color: #c62828;
      border: 1.5px solid #ef9a9a;
    }

    .status-box.info {
      display: block;
      background: #e3f2fd;
      color: #1565c0;
      border: 1.5px solid #90caf9;
    }

    .token-label {
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
    }

    .token-value {
      font-family: monospace;
      font-size: 0.78rem;
      color: #444;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔔 FCM Token</h2>
    <p class="subtitle">Register your device for push notifications</p>

    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" autocomplete="username" />
    </div>

    <button id="registerBtn">Register &amp; Get Token</button>

    <div id="statusBox" class="status-box"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-analytics.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAE2VdG2Cy9FazviYV2cAK3jXBVuC-wl54",
      authDomain: "public-dgkim-net.firebaseapp.com",
      projectId: "public-dgkim-net",
      storageBucket: "public-dgkim-net.appspot.com",
      messagingSenderId: "146213314861",
      appId: "1:146213314861:web:d27b37bf3b4a22d9c133a4",
      measurementId: "G-27P1NDX90N"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const messaging = getMessaging(app);

    const usernameInput = document.querySelector('input[name=username]');
    const statusBox = document.getElementById('statusBox');

    // Restore last username
    usernameInput.value = localStorage.getItem('username') || '';

    function showStatus(type, html) {
      statusBox.className = `status-box ${type}`;
      statusBox.innerHTML = html;
    }

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      if (!username) {
        showStatus('error', '⚠️ Please enter a username first.');
        return;
      }

      localStorage.setItem('username', username);
      showStatus('info', '⏳ Requesting notification permission…');

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        showStatus('error', '🚫 Notification permission was denied.');
        return;
      }

      showStatus('info', '⏳ Fetching FCM token…');

      try {
        const currentToken = await getToken(messaging, {
          vapidKey: "BOxvbl4f6mMCIgEkmITsHODNUjxJIwdmDvjIaSiCSvDtssGNS9moI3hRNxpPNTY6OfgcJW0LNYPr2HVilEoWLJ0"
        });

        if (!currentToken) {
          showStatus('error', '❌ No token received. Try again.');
          return;
        }

        console.log('FCM Token:', currentToken);

        const response = await fetch('https://public-api.dgkim.net/v1/fcm-tokens', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            datetime: new Date().toISOString(),
            fcmToken: currentToken,
            username
          })
        });

        if (response.ok) {
          showStatus('success',
            `✅ Token registered for <strong>${username}</strong>.<br/><br/>` +
            `<span class="token-label">FCM Token</span>` +
            `<span class="token-value">${currentToken}</span>`
          );
        } else {
          showStatus('error', `⚠️ Server responded with status ${response.status}.`);
        }
      } catch (err) {
        console.error(err);
        showStatus('error', `❌ Error: ${err.message}`);
      }
    });
  </script>
</body>
</html>
