<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Display a map on a webpage</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.9.2/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.9.2/mapbox-gl.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        position: absolute;
        background: #efefef;
        padding: 10px;
        font-family: "Open Sans", sans-serif;
      }

      #right_menu {
        top: 120px;
        right: 0;
        position: absolute;
        padding: 10px;
        font-family: "Open Sans", sans-serif;
      }
    </style>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-F8D142ZGBQ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-F8D142ZGBQ");
    </script>
  </head>

  <body>
    <div id="map"></div>
    <div id="menu">
      <input
        id="satellite-v9"
        type="radio"
        name="rtoggle"
        value="satellite"
        checked="checked"
      />
      <!-- See a list of Mapbox-hosted public styles at -->
      <!-- https://docs.mapbox.com/api/maps/styles/#mapbox-styles -->
      <label for="satellite-v9">satellite</label>
      <input id="light-v10" type="radio" name="rtoggle" value="light" />
      <label for="light-v10">light</label>
      <input id="dark-v10" type="radio" name="rtoggle" value="dark" />
      <label for="dark-v10">dark</label>
      <input id="streets-v11" type="radio" name="rtoggle" value="streets" />
      <label for="streets-v11">streets</label>
      <input id="outdoors-v11" type="radio" name="rtoggle" value="outdoors" />
      <label for="outdoors-v11">outdoors</label>
    </div>
    <!--
    <div id="right_menu">
        <button id="currentLocation">📍</button>
    </div>
    -->
    <script type="text/javascript">
      const fallbackCoord = [-122.009033, 37.3349]; // Apple Park

      function initWithGeolocation(onReady) {
        if (!navigator.geolocation) {
          onReady(fallbackCoord);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (position) {
            onReady([position.coords.longitude, position.coords.latitude]);
          },
          function (err) {
            console.log("Geolocation error:", err);
            onReady(fallbackCoord);
          },
          { maximumAge: 0, enableHighAccuracy: true, timeout: 1000 }
        );
      }

      fetch("/config.json").then(async (response) => {
        const config = await response.json();
        mapboxgl.accessToken = config.MAK;

        initWithGeolocation((center) => {
          window.map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/satellite-v9",
            center: center,
            zoom: 15,
            projection: "globe",
          });

          window.map.addControl(new mapboxgl.NavigationControl());
          window.map.addControl(
            new mapboxgl.FullscreenControl({
              container: document.querySelector("body"),
            })
          );
          window.map.addControl(
            new mapboxgl.GeolocateControl({
              positionOptions: {
                enableHighAccuracy: true,
              },
              trackUserLocation: true,
              showUserHeading: true,
            })
          );
          window.map.addControl(
            new mapboxgl.ScaleControl({
              maxWidth: 80,
              unit: "kilo",
            })
          );

          window.map.on("style.load", () => {
            map.setFog({});
          });
        });
      });
    </script>
    <script type="text/javascript">
      const layerList = document.getElementById("menu");
      const inputs = layerList.getElementsByTagName("input");

      for (const input of inputs) {
        input.onclick = (layer) => {
          const layerId = layer.target.id;
          window.map.setStyle("mapbox://styles/mapbox/" + layerId);
        };
      }
    </script>
  </body>
</html>
