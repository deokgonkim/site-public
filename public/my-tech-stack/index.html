<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tech Stack</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #d1d5db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background: radial-gradient(
            circle at top right,
            #dbeafe 0%,
            transparent 48%
          ),
          radial-gradient(circle at bottom left, #d1fae5 0%, transparent 52%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(960px, 100%);
        background: var(--panel);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        padding: 20px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
      }

      #chart {
        width: 100%;
        height: min(70vh, 640px);
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #fbfdff;
        overflow: hidden;
      }

      .legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.12);
      }

      .tooltip {
        position: fixed;
        pointer-events: none;
        background: rgba(17, 24, 39, 0.92);
        color: #ffffff;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.3;
        opacity: 0;
        transition: opacity 140ms ease;
        z-index: 999;
        max-width: 260px;
        transform: translate(10px, 10px);
      }

      .node-label {
        font-size: 12px;
        fill: #111827;
        text-anchor: middle;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My Tech Stack</h1>
      <p>My software stacks.</p>
      <div id="legend" class="legend"></div>
      <div id="chart"></div>
    </main>
    <div id="tooltip" class="tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
      const tooltip = d3.select("#tooltip");
      const chartEl = document.getElementById("chart");
      const legendEl = document.getElementById("legend");

      Promise.all([
        fetch("./stack.yaml").then((res) => {
          if (!res.ok) {
            throw new Error("Failed to load stack.yaml");
          }
          return res.text();
        }),
        fetch("./colors.json").then((res) => {
          if (!res.ok) {
            throw new Error("Failed to load colors.json");
          }
          return res.json();
        }),
      ])
        .then(([yamlText, palette]) => {
          const data = jsyaml.load(yamlText);
          const colors = Array.isArray(palette.colors) ? palette.colors : [];
          const defaultColor = colors[0] || "#6b7280";
          const { width, height } = chartEl.getBoundingClientRect();
          const nodes = data.tools.map((tool) => ({ ...tool }));
          const nodeIds = new Set(nodes.map((n) => n.id));
          const links = data.edges.map((edge) => ({
            source: edge.from,
            target: edge.to,
          }));

          const invalidLink = links.find(
            (l) => !nodeIds.has(l.source) || !nodeIds.has(l.target)
          );
          if (invalidLink) {
            throw new Error(
              `Invalid edge: ${invalidLink.source} -> ${invalidLink.target}`
            );
          }

          const types = [...new Set(nodes.map((n) => n.type || "default"))];
          const colorByType = { default: defaultColor };
          types.forEach((type, index) => {
            if (type === "default") {
              return;
            }
            colorByType[type] = colors[index + 1] || defaultColor;
          });

          types.forEach((type) => {
            const item = document.createElement("div");
            item.className = "legend-item";
            item.innerHTML = `<span class="swatch" style="background:${
              colorByType[type] || defaultColor
            }"></span>${type}`;
            legendEl.appendChild(item);
          });

          const svg = d3
            .select("#chart")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("width", "100%")
            .attr("height", "100%");

          const simulation = d3
            .forceSimulation(nodes)
            .force(
              "link",
              d3
                .forceLink(links)
                .id((d) => d.id)
                .distance(140)
                .strength(0.8)
            )
            .force("charge", d3.forceManyBody().strength(-420))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(40));

          const rootNode = nodes.find((n) => n.type === "root");
          if (rootNode) {
            rootNode.x = width / 2;
            rootNode.y = height / 2;
            rootNode.fx = width / 2;
            rootNode.fy = height / 2;
          } else if (nodes.length === 1) {
            nodes[0].x = width / 2;
            nodes[0].y = height / 2;
            nodes[0].fx = width / 2;
            nodes[0].fy = height / 2;
          }

          const link = svg
            .append("g")
            .attr("stroke", "#94a3b8")
            .attr("stroke-opacity", 0.8)
            .selectAll("line")
            .data(links)
            .join("line")
            .attr("stroke-width", 2);

          const node = svg
            .append("g")
            .attr("stroke", "#ffffff")
            .attr("stroke-width", 2)
            .selectAll("circle")
            .data(nodes)
            .join("circle")
            .attr("r", 18)
            .attr("fill", (d) => colorByType[d.type] || defaultColor)
            .style("cursor", (d) => (d.url ? "pointer" : "grab"))
            .call(
              d3
                .drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended)
            );

          const labels = svg
            .append("g")
            .selectAll("text")
            .data(nodes)
            .join("text")
            .attr("class", "node-label")
            .attr("dy", 34)
            .text((d) => d.label);

          node
            .on("mousemove", (event, d) => {
              const tags =
                d.tags && d.tags.length ? `<br>tags: ${d.tags.join(", ")}` : "";
              const url = d.url ? `<br>url: ${d.url}` : "";
              tooltip
                .style("opacity", 1)
                .style("left", `${event.clientX}px`)
                .style("top", `${event.clientY}px`)
                .html(
                  `<strong>${d.label}</strong><br>type: ${
                    d.type || "unknown"
                  }${tags}${url}`
                );
            })
            .on("mouseleave", () => {
              tooltip.style("opacity", 0);
            })
            .on("click", (event, d) => {
              if (event.defaultPrevented || !d.url) {
                return;
              }

              const popup = window.open(d.url, "_blank", "noopener,noreferrer");
              if (popup) {
                popup.opener = null;
              }
            });

          simulation.on("tick", () => {
            const padding = 58;
            nodes.forEach((d) => {
              d.x = Math.max(padding, Math.min(width - padding, d.x));
              d.y = Math.max(padding, Math.min(height - padding, d.y));
            });

            link
              .attr("x1", (d) => d.source.x)
              .attr("y1", (d) => d.source.y)
              .attr("x2", (d) => d.target.x)
              .attr("y2", (d) => d.target.y);

            node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
            labels.attr("x", (d) => d.x).attr("y", (d) => d.y);
          });

          function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.2).restart();
            d.fx = d.x;
            d.fy = d.y;
          }

          function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
          }

          function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          }
        })
        .catch((err) => {
          chartEl.innerHTML = `<p style="padding:16px;color:#b91c1c;">${err.message}</p>`;
        });
    </script>
  </body>
</html>
