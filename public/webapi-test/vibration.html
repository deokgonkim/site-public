<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web API Test</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        padding: 32px 28px;
        width: 100%;
        max-width: 420px;
      }

      h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 8px;
        text-align: center;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #888;
        text-align: center;
        margin-bottom: 28px;
      }

      .api-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .api-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 14px 18px;
        background: #f8fafc;
        border: 1.5px solid #dde1e7;
        border-radius: 14px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #1a1a2e;
        cursor: pointer;
        text-align: left;
        transition: background 0.2s, border-color 0.2s, transform 0.1s;
        font-family: inherit;
      }

      .api-btn:hover {
        background: #eef2ff;
        border-color: #6c63ff;
      }
      .api-btn:active {
        transform: scale(0.98);
      }

      .api-btn .btn-icon {
        font-size: 1.4rem;
        flex-shrink: 0;
      }
      .api-btn .btn-label {
        flex: 1;
      }

      #vibrateBtn {
        --accent: #6c63ff;
      }

      .status-box {
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.88rem;
        display: none;
      }

      .status-box.show {
        display: block;
      }

      .status-box.success {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1.5px solid #a5d6a7;
      }

      .status-box.error {
        background: #fce4ec;
        color: #c62828;
        border: 1.5px solid #ef9a9a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🧪 Web API Test</h2>
      <p class="subtitle">Test browser Web APIs on this device</p>

      <div class="api-list">
        <button class="api-btn" id="vibrateBtn" onclick="onvibrate()">
          <span class="btn-icon">📳</span>
          <span class="btn-label">Vibrate</span>
        </button>
      </div>
      <div id="statusBox" class="status-box"></div>
    </div>

    <script>
      const statusBox = document.getElementById("statusBox");

      function showStatus(type, message) {
        statusBox.className = `status-box show ${type}`;
        statusBox.textContent = message;
      }

      const onvibrate = () => {
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200, 100, 200, 100, 200]);
          showStatus("success", "✅ Vibration triggered!");
        } else {
          showStatus(
            "error",
            "🚫 Vibration API is not supported on this device."
          );
        }
      };
    </script>
  </body>
</html>
