<!DOCTYPE html>
<html>
  <head>
    <title>Google Maps test</title>
    <script src="./map.js"></script>
    <style>
      body {
        border: 0;
        margin: 0;
      }

      .layout {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: row;
        overflow: hidden;
      }

      .left-pane {
        width: 20vw;
        min-width: 280px;
        padding: 0.5em;
        overflow-y: auto;
        box-sizing: border-box;
        background: #fff;
      }

      .left-pane.is-hidden {
        display: none;
      }

      .toggle-pane {
        width: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 1px solid #ddd;
        border-right: 1px solid #ddd;
        background: #f5f5f5;
      }

      .toggle-button {
        width: 22px;
        height: 44px;
        padding: 0;
        border: 1px solid #bbb;
        border-radius: 999px;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
      }

      .map-pane {
        flex: 1;
        min-width: 0;
      }

      #map-canvas {
        height: 100%;
      }
    </style>
    <script type="text/javascript">
      window.addEventListener("error", function (e) {
        console.log(e);
        debugger;
      });
    </script>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-F8D142ZGBQ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-F8D142ZGBQ");
    </script>
  </head>

  <body>
    <script type="text/javascript"></script>
    <div class="layout">
      <div id="left-pane" class="left-pane">
        <button onclick="toggleEditable(); return false;">
          Toggle Editable
        </button>
        <button onclick="clearMap(); return false;">Clear Map</button>
        <h2>draw mode</h2>
        Dong
        <input type="radio" name="drawmode" value="dong" checked="checked" />
        Polygon <input type="radio" name="drawmode" value="polygon" />
        <ul>
          <li>
            <button onclick="savePolygon(); return false;">
              Save Polygon(var coords)
            </button>
          </li>
          <li>
            <button onclick="addPolygonToMap(); return false;">
              Show Polygon(Using var coords)
            </button>
          </li>
        </ul>
        <ul>
          <li>LAT : <input type="text" name="lat" value="" /></li>
          <li>LNG : <input type="text" name="lng" value="" /></li>
        </ul>
        <hr />
        <form name="form4" method="post" onsubmit="return false;">
          <textarea name="textarea" style="width: 100%" rows="10">
{ "id": "807", "type": "Feature", "properties": { "EMD_CD": "27260104", "EMD_ENG_NM": "Suseong-dong 2(i)-ga", "EMD_KOR_NM": "\uc218\uc131\ub3d92\uac00" }, "geometry": { "type": "Polygon", "coordinates": [[[128.6132732784135, 35.85113899945861], [128.61410788409898, 35.859773498500566], [128.61763129693347, 35.85959554439207], [128.61676622240017, 35.850922109231455], [128.6132732784135, 35.85113899945861]]] } }
                      </textarea
          >
          <br />
          Interval
          <input
            type="text"
            value="0"
            name="interval"
            style="width: 80px"
            onkeydown="intervalKey(event);"
          />
          ms
          <button onclick="increaseInterval()">+</button>
          <button onclick="decreaseInterval()">-</button>
          <br />
          <input
            type="button"
            onclick="return showGeoJson(JSON.parse(document.form4.textarea.value)); return false;"
            value="Display"
          />
          <button onclick="togglePause();">Pause / Resume</button>
        </form>
      </div>
      <div class="toggle-pane">
        <button
          id="pane-toggle-button"
          class="toggle-button"
          onclick="toggleLeftPane(); return false;"
          aria-label="Hide left pane"
          title="Hide left pane"
        >
          &lt;
        </button>
      </div>
      <div class="map-pane">
        <div id="map-canvas"></div>
      </div>
    </div>
    <script type="text/javascript">
      function updatePaneToggleButton() {
        const leftPane = document.getElementById("left-pane");
        const button = document.getElementById("pane-toggle-button");
        const isHidden = leftPane.classList.contains("is-hidden");
        button.innerHTML = isHidden ? "&gt;" : "&lt;";
        button.setAttribute(
          "aria-label",
          isHidden ? "Show left pane" : "Hide left pane"
        );
        button.title = isHidden ? "Show left pane" : "Hide left pane";
      }

      function resizeMap() {
        if (!window.map || !window.google || !window.google.maps) {
          return;
        }

        const center = window.map.getCenter();
        window.google.maps.event.trigger(window.map, "resize");
        if (center) {
          window.map.setCenter(center);
        }
      }

      function toggleLeftPane() {
        const leftPane = document.getElementById("left-pane");
        leftPane.classList.toggle("is-hidden");
        updatePaneToggleButton();
        window.setTimeout(resizeMap, 0);
      }

      function start(coord) {
        const zoomLevel = 14;
        initGoogleMap("map-canvas", coord, zoomLevel);
      }

      const fallbackCoord = { lng: -122.009033, lat: 37.3349 };

      function initWithGeolocation(onReady) {
        if (!navigator.geolocation) {
          onReady(fallbackCoord);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (position) {
            onReady({
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            });
          },
          function (err) {
            console.log("Geolocation error:", err);
            onReady(fallbackCoord);
          },
          { maximumAge: 0, enableHighAccuracy: true, timeout: 1000 }
        );
      }

      fetch("/config.json").then(async (response) => {
        const config = await response.json();
        const script_google_maps = document.createElement("script");
        script_google_maps.src = `https://maps.googleapis.com/maps/api/js?v=3.exp&key=${config.GAK}`;
        script_google_maps.addEventListener("load", () => {
          console.log("Google Script loaded");
          initWithGeolocation(start);
        });
        document.head.appendChild(script_google_maps);
      });

      updatePaneToggleButton();
    </script>
  </body>
</html>
